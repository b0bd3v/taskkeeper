name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure git for tests
        run: |
          git config --global user.email "ci@taskkeeper.test"
          git config --global user.name "TaskKeeper CI"
          git config --global init.defaultBranch main

      - name: Compile extension
        run: npm run compile

      - name: Run tests
        run: npm test
